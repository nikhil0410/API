name: student-success-pipeline
prefect-version: 3.4.25

build: null
push: null

pull:
- prefect.deployments.steps.git_clone:
    id: clone                       # <-- REQUIRED so {{ clone.directory }} works
    repository: https://github.com/nikhil0410/API.git
    branch: main
- prefect.deployments.steps.set_working_directory:
    directory: "{{ clone.directory }}/Assignment API/student-success-pipeline"
- prefect.deployments.steps.pip_install_requirements:
    requirements_file: requirements.txt   # relative to the working dir above

deployments:
- name: full-pipeline-cloud
  entrypoint: flows.py:full_pipeline_flow
  work_pool:
    name: my-pool                   # <-- your Managed/push pool name
    job_variables: {}
  schedule:
    interval: 120